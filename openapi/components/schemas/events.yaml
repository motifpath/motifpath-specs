TrackingEventBase:
  type: object
  description: |
    Common envelope carried by every student tracking event emitted by the Vue 3 SPA.
    All event-specific schemas extend this base via allOf. Consumers use event_type to
    route; event_id enables idempotent processing as required by ADR-006 (at-least-once
    Kafka delivery).
  properties:
    event_id:
      type: string
      format: uuid
      description: |
        Client-generated unique identifier for this event occurrence. The Aggregation Worker
        must key idempotency checks on event_id to safely handle duplicate deliveries from
        the Kafka consumer group.
    event_type:
      type: string
      enum:
        - lesson.started
        - lesson.resumed
        - lesson.completed
        - exercise.started
        - exercise.progress
        - exercise.answer_sent
        - exercise.ended
      description: |
        Discriminator field. Determines which event-specific payload fields are present.
        The set of valid values is closed — adding a new event type requires a spec change
        and a new ADR if it introduces a new consumer concern.
    student_id:
      type: string
      format: uuid
      description: |
        ID of the authenticated student who generated this event. Used as the Kafka
        partition key (ADR-006), guaranteeing ordered delivery of all events for a given
        student to the same partition and consumer.
    session_id:
      type: string
      format: uuid
      description: |
        Identifies the student's active browser session. Generated by the frontend at
        session start and carried on all events until the page is reloaded or the session
        expires. Enables session-scoped aggregation in the Aggregation Worker.
    occurred_at:
      type: string
      format: date-time
      description: |
        Client-side timestamp at which the event occurred, in ISO 8601 format with UTC
        offset. Stored as-is by the Event Ingestion Service. Server-side ingestion time
        is recorded separately and is not part of the event payload.
  required:
    - event_id
    - event_type
    - student_id
    - session_id
    - occurred_at

TrackingEvent:
  description: |
    A student tracking event submitted by the Vue 3 SPA to the Event Ingestion Service.
    Exactly one event-specific schema applies, discriminated by event_type. The Event
    Ingestion Service persists the raw payload to MongoDB and publishes it to the
    motifpath.events Kafka topic (ADR-006).
  discriminator:
    propertyName: event_type
    mapping:
      lesson.started: '#/LessonStartedEvent'
      lesson.resumed: '#/LessonResumedEvent'
      lesson.completed: '#/LessonCompletedEvent'
      exercise.started: '#/ExerciseStartedEvent'
      exercise.progress: '#/ExerciseProgressEvent'
      exercise.answer_sent: '#/ExerciseAnswerSentEvent'
      exercise.ended: '#/ExerciseEndedEvent'
  oneOf:
    - $ref: '#/LessonStartedEvent'
    - $ref: '#/LessonResumedEvent'
    - $ref: '#/LessonCompletedEvent'
    - $ref: '#/ExerciseStartedEvent'
    - $ref: '#/ExerciseProgressEvent'
    - $ref: '#/ExerciseAnswerSentEvent'
    - $ref: '#/ExerciseEndedEvent'

ContentContext:
  type: object
  description: |
    Contextual metadata about the ContentNode the student is engaging with. Required on
    all lesson events. The object is open (additionalProperties allowed) to accommodate
    future metadata fields without a schema bump; all currently known properties are
    documented here. Consumers must treat undocumented keys as opaque.
  properties:
    content_node_id:
      type: string
      format: uuid
      description: ID of the ContentNode the student started, resumed, or completed.
    content_type:
      type: string
      enum:
        - video
        - article
      description: |
        Media format of the content node. Mirrors ContentNode.content_type. Included in
        the event payload to avoid a lookup at aggregation time.
    teacher_id:
      type: string
      format: uuid
      description: |
        ID of the teacher who published this content node. Enables teacher-scoped
        engagement analytics without a join at query time.
  additionalProperties: true
  required:
    - content_node_id

TriggerContext:
  type: object
  description: |
    Describes the context in which an exercise was initiated. Required on all exercise
    events. Enables downstream analytics to distinguish spontaneous practice from
    assessment-driven and remediation-driven exercises.
  properties:
    source:
      type: string
      enum:
        - challenge_sequence
        - free_practice
        - remediation
      description: |
        What triggered this exercise session. challenge_sequence = part of a
        ContentExpansionSettings challenge; free_practice = student initiated independently;
        remediation = surfaced by the recommendation engine as a remediation target.
    content_node_id:
      type: string
      format: uuid
      description: |
        ID of the ContentNode in whose context the exercise was triggered. Present when
        source is challenge_sequence or remediation. May be omitted for free_practice.
    challenge_id:
      type: string
      format: uuid
      description: |
        ID of the Challenge this exercise belongs to. Present only when source is
        challenge_sequence. Enables per-challenge scoring in the Aggregation Worker.
  additionalProperties: false
  required:
    - source

LessonStartedEvent:
  allOf:
    - $ref: '#/TrackingEventBase'
    - type: object
      description: |
        Emitted when a student navigates to and begins engaging with a ContentNode for
        the first time in a session. Distinct from lesson.resumed, which fires on
        re-entering a node already started in a prior session.
      properties:
        event_type:
          type: string
          enum:
            - lesson.started
        content_context:
          $ref: '#/ContentContext'
      required:
        - event_type
        - content_context

LessonResumedEvent:
  allOf:
    - $ref: '#/TrackingEventBase'
    - type: object
      description: |
        Emitted when a student returns to a ContentNode they previously started but did
        not complete. One resume event per re-entry in a new session.
      properties:
        event_type:
          type: string
          enum:
            - lesson.resumed
        content_context:
          $ref: '#/ContentContext'
      required:
        - event_type
        - content_context

LessonCompletedEvent:
  allOf:
    - $ref: '#/TrackingEventBase'
    - type: object
      description: |
        Emitted when a student marks a ContentNode as complete or the platform determines
        completion by its configured criteria. Triggers prerequisite checking for
        subsequent nodes in the learning path.
      properties:
        event_type:
          type: string
          enum:
            - lesson.completed
        content_context:
          $ref: '#/ContentContext'
        duration_seconds:
          type: integer
          minimum: 0
          description: |
            Total time the student spent on this ContentNode in this session, in seconds.
            Client-computed from session start to completion event. Used for engagement
            analytics. Omitted if the client cannot determine session duration reliably
            (e.g., tab was backgrounded for an unknown duration).
      required:
        - event_type
        - content_context

ExerciseStartedEvent:
  allOf:
    - $ref: '#/TrackingEventBase'
    - type: object
      description: |
        Emitted when a student begins an exercise attempt. Marks the start of an attempt
        session. Always paired with exercise.ended, which marks the conclusion.
      properties:
        event_type:
          type: string
          enum:
            - exercise.started
        exercise_id:
          type: string
          format: uuid
          description: ID of the exercise being attempted.
        trigger_context:
          $ref: '#/TriggerContext'
      required:
        - event_type
        - exercise_id
        - trigger_context

ExerciseProgressEvent:
  allOf:
    - $ref: '#/TrackingEventBase'
    - type: object
      description: |
        Emitted periodically during an active exercise attempt to signal continued
        engagement. Frequency is determined by the client. Used to distinguish active
        practice sessions from abandoned ones where exercise.ended was never emitted.
      properties:
        event_type:
          type: string
          enum:
            - exercise.progress
        exercise_id:
          type: string
          format: uuid
          description: ID of the exercise in progress.
        trigger_context:
          $ref: '#/TriggerContext'
        elapsed_seconds:
          type: integer
          minimum: 0
          description: |
            Time elapsed since the corresponding exercise.started event, in seconds.
            Client-computed. Helps the Aggregation Worker detect paused sessions and
            compute actual active-practice time per exercise.
      required:
        - event_type
        - exercise_id
        - trigger_context

ExerciseAnswerSentEvent:
  allOf:
    - $ref: '#/TrackingEventBase'
    - type: object
      description: |
        Emitted when a student submits an answer to an exercise. May fire multiple times
        within a single exercise attempt (retry scenarios). The Aggregation Worker uses
        this event to compute attempt counts and answer-correctness rates per challenge.
      properties:
        event_type:
          type: string
          enum:
            - exercise.answer_sent
        exercise_id:
          type: string
          format: uuid
          description: ID of the exercise for which the answer was submitted.
        trigger_context:
          $ref: '#/TriggerContext'
        attempt_number:
          type: integer
          minimum: 1
          description: |
            1-indexed count of answer submissions for this exercise_id within the current
            exercise attempt. Enables retry-aware scoring in the Aggregation Worker.
        answer_payload:
          type: object
          description: |
            The student's submitted answer. Structure varies by exercise type and is treated
            as opaque by the Event Ingestion Service and Aggregation Worker at MVP.
            Exercise-type-specific payload schemas are a post-MVP concern.
          additionalProperties: true
      required:
        - event_type
        - exercise_id
        - trigger_context
        - attempt_number

ExerciseEndedEvent:
  allOf:
    - $ref: '#/TrackingEventBase'
    - type: object
      description: |
        Emitted when an exercise attempt session ends, regardless of outcome. Always paired
        with exercise.started. If the client crashes before emitting this event, the
        Aggregation Worker infers abandonment after a configurable inactivity timeout.
      properties:
        event_type:
          type: string
          enum:
            - exercise.ended
        exercise_id:
          type: string
          format: uuid
          description: ID of the exercise whose attempt just ended.
        trigger_context:
          $ref: '#/TriggerContext'
        outcome:
          type: string
          enum:
            - completed
            - abandoned
          description: |
            How the exercise attempt concluded. completed = student submitted a final
            answer and explicitly finished; abandoned = student left without completing.
            The Aggregation Worker uses outcome to compute completion rates per challenge.
        final_score:
          type: integer
          minimum: 0
          maximum: 100
          description: |
            Score percentage (0–100) for this attempt, as computed by the client based
            on the answers submitted. Present only when outcome is completed. Used by
            the Aggregation Worker to evaluate against the Challenge threshold and
            determine whether a remediation recommendation should be surfaced.
      required:
        - event_type
        - exercise_id
        - trigger_context
        - outcome
